# ===========================================================================
# SERVING — Serving reads ontology + serving only
# ===========================================================================

serving:
  # Custom entity extraction rules applied before the default command regex.
  extractor_rules:
    - pattern: "\\b(PE|P|CE|RR|ASBR|ABR|CPE)\\b"
      entity_type: device
    - pattern: "\\b(GE|XGE|Eth-Trunk|Loopback|Tunnel|LoopBack)[0-9/]*\\b"
      entity_type: interface
    - pattern: "\\b(BGP|OSPF|IS-IS|ISIS|LDP|RSVP|BFD|VRRP|PIM|IGMP|MPLS|GRE|IPSec)\\b"
      entity_type: protocol

  # Query understanding overrides for the rule-based fallback path.
  query_understanding:
    command_regex: "(display|reset|ping|tracert|debugging|undo|commit|rollback)\\s+([a-z][a-z0-9_-]*)"
    op_map:
      新增: create
      添加: create
      创建: create
      修改: modify
      更改: modify
      编辑: modify
      删除: undo
      移除: undo
      查询: display
      查看: display
      显示: display
      设置: set
      配置: set
    network_elements:
      - PE
      - P
      - CE
      - RR
      - ASBR
      - ABR
      - CPE
    products:
      - NE40E
      - NE9000
      - CX600
      - ATN

  # Per-intent retrieval weights and top-k limits.
  route_policy:
    default:
      lexical_bm25:
        weight: 1.0
        top_k: 50
      entity_exact:
        weight: 1.0
        top_k: 20
      dense_vector:
        weight: 0.8
        top_k: 50

    command_usage:
      entity_exact:
        weight: 1.6
        top_k: 20
      lexical_bm25:
        weight: 1.0
        top_k: 50
      dense_vector:
        weight: 0.4
        top_k: 20

    concept_lookup:
      dense_vector:
        weight: 1.3
        top_k: 60
      lexical_bm25:
        weight: 1.0
        top_k: 50
      entity_exact:
        weight: 0.5
        top_k: 15

    troubleshooting:
      lexical_bm25:
        weight: 1.2
        top_k: 60
      entity_exact:
        weight: 1.1
        top_k: 30
      dense_vector:
        weight: 0.7
        top_k: 30

    procedure:
      lexical_bm25:
        weight: 1.1
        top_k: 50
      entity_exact:
        weight: 1.0
        top_k: 25
      dense_vector:
        weight: 0.8
        top_k: 40

    comparison:
      dense_vector:
        weight: 1.2
        top_k: 60
      lexical_bm25:
        weight: 1.0
        top_k: 50
      entity_exact:
        weight: 0.7
        top_k: 20

    navigational:
      entity_exact:
        weight: 1.5
        top_k: 10
      lexical_bm25:
        weight: 0.8
        top_k: 20
      dense_vector:
        weight: 0.3
        top_k: 10

    general:
      lexical_bm25:
        weight: 1.0
        top_k: 50
      dense_vector:
        weight: 1.0
        top_k: 50
      entity_exact:
        weight: 0.8
        top_k: 20